<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Support Chat | worldclassshipping Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; height: 100vh; overflow: hidden; }
    .navbar { background: #2c3e50; color: white; padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .navbar .logo { font-size: 18px; font-weight: 600; }
    .navbar nav a { color: #ecf0f1; text-decoration: none; margin-left: 24px; font-size: 14px; opacity: 0.8; }
    .navbar nav a.active { opacity: 1; color: #3498db; }
    .chat-admin-container { display: flex; height: calc(100vh - 60px); }
    .chat-sidebar { width: 320px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-header h3 { font-size: 16px; color: #2c3e50; }
    .unread-badge { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; display: none; }
    .chat-search { padding: 12px 16px; border-bottom: 1px solid #e0e0e0; }
    .chat-search input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
    .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
    .chat-item { display: flex; align-items: center; padding: 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-bottom: 4px; }
    .chat-item:hover { background: #f8f9fa; }
    .chat-item.active { background: #e3f2fd; }
    .chat-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; margin-right: 12px; flex-shrink: 0; }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; color: #2c3e50; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview { font-size: 13px; color: #7f8c8d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-meta { text-align: right; flex-shrink: 0; margin-left: 8px; }
    .chat-time { font-size: 12px; color: #95a5a6; margin-bottom: 4px; }
    .chat-unread { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: 600; display: inline-block; }
    .empty-state { text-align: center; padding: 40px 20px; color: #7f8c8d; }
    .empty-state button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 12px; }
    .chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
    .chat-header { padding: 16px 24px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; background: white; }
    .chat-header-info h4 { font-size: 16px; color: #2c3e50; margin-bottom: 4px; }
    .chat-header-info p { font-size: 13px; color: #7f8c8d; }
    .chat-header-actions { display: flex; gap: 8px; }
    .btn-close, .btn-delete { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-delete { color: #e74c3c; border-color: #e74c3c; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; }
    .empty-chat { text-align: center; padding: 60px 20px; color: #bdc3c7; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .message { max-width: 70%; margin-bottom: 16px; }
    .message.sent { align-self: flex-end; margin-left: auto; }
    .message.received { align-self: flex-start; margin-right: auto; }
    .message-header { font-size: 12px; color: #7f8c8d; margin-bottom: 4px; padding: 0 4px; }
    .message-content { padding: 12px 16px; border-radius: 18px; line-height: 1.4; word-wrap: break-word; }
    .message.sent .message-content { background: #3498db; color: white; border-bottom-right-radius: 4px; }
    .message.received .message-content { background: white; color: #2c3e50; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .message-time { font-size: 11px; color: #95a5a6; margin-top: 4px; padding: 0 4px; }
    .chat-input-area { padding: 16px 24px; border-top: 1px solid #e0e0e0; background: white; }
    .input-wrapper { display: flex; align-items: flex-end; gap: 12px; background: #f8f9fa; padding: 8px 16px; border-radius: 24px; border: 1px solid #e0e0e0; }
    .input-wrapper:focus-within { border-color: #3498db; background: white; }
    #messageInput { flex: 1; border: none; background: transparent; resize: none; outline: none; font-size: 14px; line-height: 1.4; max-height: 120px; padding: 8px 0; font-family: inherit; }
    .btn-send { width: 40px; height: 40px; background: #3498db; color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: 8px; color: white; font-weight: 500; z-index: 1000; opacity: 0; transform: translateY(20px); transition: all 0.3s ease; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.info { background: #3498db; }
    .toast.success { background: #27ae60; }
    .toast.error { background: #e74c3c; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error-state { color: #e74c3c; text-align: center; padding: 40px 20px; }
    .error-state button { margin-top: 12px; padding: 8px 16px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">worldclassshipping Admin - Customer Support</div>
  <nav>
    <a href="admin.html">Shipments</a>
    <a href="chat.html" class="active">Support Chat</a>
  </nav>
</header>

<div class="chat-admin-container">
  <aside class="chat-sidebar">
    <div class="sidebar-header">
      <h3>Active Chats</h3>
      <span class="unread-badge" id="totalUnread">0</span>
    </div>
    <div class="chat-search">
      <input type="text" id="searchChats" placeholder="Search by tracking number...">
    </div>
    <div class="chat-list" id="chatList">
      <div class="empty-state">
        <div class="loading"></div>
        <p style="margin-top: 12px;">Loading chats...</p>
      </div>
    </div>
  </aside>

  <main class="chat-main">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-info">
        <h4 id="chatTitle">Select a chat</h4>
        <p id="chatSubtitle">Click on a conversation to start</p>
      </div>
      <div class="chat-header-actions">
        <button id="closeChatBtn" class="btn-close">Close Chat</button>
        <button id="deleteChatBtn" class="btn-delete">Delete</button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="empty-chat">
        <div class="empty-icon">💬</div>
        <p>Select a conversation from the sidebar</p>
      </div>
    </div>

    <div class="chat-input-area" id="chatInputArea" style="display: none;">
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
        <button id="sendBtn" class="btn-send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = '/api/chat';

let currentChatId = null;
let currentTrackingNumber = null;
let chats = [];
let refreshInterval = null;

const chatList = document.getElementById('chatList');
const chatMessages = document.getElementById('chatMessages');
const chatTitle = document.getElementById('chatTitle');
const chatSubtitle = document.getElementById('chatSubtitle');
const chatInputArea = document.getElementById('chatInputArea');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const searchInput = document.getElementById('searchChats');
const closeChatBtn = document.getElementById('closeChatBtn');
const deleteChatBtn = document.getElementById('deleteChatBtn');
const totalUnreadBadge = document.getElementById('totalUnread');
const toast = document.getElementById('toast');

document.addEventListener('DOMContentLoaded', () => {
  console.log('chat.js loaded');
  loadChats();
  setupEventListeners();
  startAutoRefresh();
});

function setupEventListeners() {
  if (sendBtn) sendBtn.addEventListener('click', sendMessage);
  if (messageInput) {
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    messageInput.addEventListener('input', autoResize);
  }
  if (searchInput) {
    searchInput.addEventListener('input', (e) => filterChats(e.target.value));
  }
  if (closeChatBtn) closeChatBtn.addEventListener('click', closeCurrentChat);
  if (deleteChatBtn) deleteChatBtn.addEventListener('click', deleteCurrentChat);
}
async function loadChats() {
  console.log('Loading chats from:', `${API_BASE}/conversations`);
  try {
    const res = await fetch(`${API_BASE}/conversations`);
    console.log('Response status:', res.status);
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    chats = await res.json();
    console.log('Chats loaded:', chats.length);
    renderChatList();
    updateTotalUnread();
  } catch (err) {
    console.error('Load chats failed:', err);
    showToast('Failed to load chats: ' + err.message, 'error');
    chatList.innerHTML = `<div class="error-state"><p>Failed to load chats</p><p style="font-size:12px">${err.message}</p><button onclick="loadChats()">Retry</button></div>`;
  }
}

function renderChatList() {
  if (!chats || !chats.length) {
    chatList.innerHTML = `<div class="empty-state"><p>No active chats</p><button onclick="createTestChat()">Create Test Chat</button></div>`;
    return;
  }
  chatList.innerHTML = chats.map(chat => {
    let lastMessage = chat.lastMessage || {};
    if (typeof lastMessage === "string") {
      try { lastMessage = JSON.parse(lastMessage); } catch { lastMessage = {}; }
    }
    const unreadCount = chat.unreadCount || 0;
    const preview = lastMessage.content || "No messages yet";
    const time = lastMessage.createdAt ? formatTime(lastMessage.createdAt) : "";
    return `
    <div class="chat-item ${chat._id === currentChatId ? 'active' : ''}" onclick="selectChat('${chat._id}')">
      <div class="chat-avatar">${chat.trackingNumber ? chat.trackingNumber.slice(0,2).toUpperCase() : "??"}</div>
      <div class="chat-info">
        <div class="chat-name">${chat.trackingNumber || "Unknown"}</div>
        <div class="chat-preview">${preview}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${time}</div>
        ${unreadCount ? `<span class="chat-unread">${unreadCount}</span>` : ''}
      </div>
    </div>`;
  }).join("");
}

window.createTestChat = async function() {
  const testTracking = 'TEST' + Math.floor(Math.random() * 10000);
  try {
    const res = await fetch(`${API_BASE}/conversations/${testTracking}`);
    const data = await res.json();
    console.log('Created test chat:', data);
    showToast('Test chat created: ' + testTracking, 'success');
    loadChats();
  } catch (err) {
    console.error('Failed to create test chat:', err);
    showToast('Failed to create test chat', 'error');
  }
}
window.selectChat = async function(chatId) {
  currentChatId = chatId;
  const chat = chats.find(c => c._id === chatId);
  if (!chat) return;
  currentTrackingNumber = chat.trackingNumber;
  chatTitle.textContent = `Tracking: ${chat.trackingNumber}`;
  chatSubtitle.textContent = `Started: ${formatDate(chat.createdAt)}`;
  chatInputArea.style.display = "block";
  renderChatList();
  await loadMessages(chatId);
  await markAsRead(chatId);
  loadChats();
};

async function loadMessages(chatId) {
  try {
    const res = await fetch(`${API_BASE}/conversations/${chatId}/messages`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const messages = await res.json();
    renderMessages(messages);
  } catch (err) {
    console.error('Load messages failed:', err);
    showToast("Failed to load messages", "error");
  }
}

function renderMessages(messages) {
  if (!messages || !messages.length) {
    chatMessages.innerHTML = `<div class="empty-chat"><div class="empty-icon">💬</div><p>No messages yet</p></div>`;
    return;
  }
  chatMessages.innerHTML = messages.map(msg => {
    const isAdmin = msg.sender === "admin";
    return `
    <div class="message ${isAdmin ? "sent" : "received"}">
      <div class="message-header">${isAdmin ? "You (Admin)" : "Customer"}</div>
      <div class="message-content">${escapeHtml(msg.content)}</div>
      <div class="message-time">${formatTime(msg.createdAt)}${msg.read && isAdmin ? ' ✓✓' : ''}</div>
    </div>`;
  }).join("");
  scrollToBottom();
}
async function sendMessage() {
  const content = messageInput.value.trim();
  if (!content || !currentChatId) return;
  const tempDiv = document.createElement('div');
  tempDiv.className = 'message sent';
  tempDiv.innerHTML = `<div class="message-header">You (Admin)</div><div class="message-content">${escapeHtml(content)}</div><div class="message-time">${formatTime(new Date())}</div>`;
  const emptyChat = chatMessages.querySelector('.empty-chat');
  if (emptyChat) chatMessages.innerHTML = '';
  chatMessages.appendChild(tempDiv);
  scrollToBottom();
  try {
    const res = await fetch(`${API_BASE}/conversations/${currentChatId}/messages`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content, sender: "admin" })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    messageInput.value = "";
    messageInput.style.height = "auto";
    await loadMessages(currentChatId);
    await loadChats();
  } catch (err) {
    console.error('Send failed:', err);
    showToast("Failed to send message", "error");
    loadMessages(currentChatId);
  }
}

async function markAsRead(chatId) {
  try {
    await fetch(`${API_BASE}/conversations/${chatId}/read`, { method: "PUT" });
  } catch (err) {
    console.error('Mark read failed:', err);
  }
}

async function closeCurrentChat() {
  if (!currentChatId) return;
  if (!confirm('Close this conversation? It will be archived.')) return;
  try {
    const res = await fetch(`${API_BASE}/conversations/${currentChatId}/close`, { method: "PUT" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    showToast('Chat closed', 'success');
    resetChatView();
    loadChats();
  } catch (err) {
    console.error('Close chat failed:', err);
    showToast('Failed to close chat', 'error');
  }
}

async function deleteCurrentChat() {
  if (!currentChatId) return;
  if (!confirm('Delete this conversation permanently?')) return;
  try {
    const res = await fetch(`${API_BASE}/conversations/${currentChatId}`, { method: "DELETE" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    showToast('Chat deleted', 'success');
    resetChatView();
    loadChats();
  } catch (err) {
    console.error('Delete chat failed:', err);
    showToast('Failed to delete chat', 'error');
  }
}
function resetChatView() {
  currentChatId = null;
  currentTrackingNumber = null;
  chatTitle.textContent = "Select a chat";
  chatSubtitle.textContent = "Click on a conversation to start";
  chatInputArea.style.display = "none";
  chatMessages.innerHTML = `<div class="empty-chat"><div class="empty-icon">💬</div><p>Select a conversation from the sidebar</p></div>`;
}

function filterChats(query) {
  if (!query) { renderChatList(); return; }
  document.querySelectorAll(".chat-item").forEach(item => {
    const name = item.querySelector(".chat-name")?.textContent.toLowerCase() || '';
    item.style.display = name.includes(query.toLowerCase()) ? "flex" : "none";
  });
}

function updateTotalUnread() {
  const total = chats.reduce((sum, c) => sum + (c.unreadCount || 0), 0);
  totalUnreadBadge.textContent = total;
  totalUnreadBadge.style.display = total ? "inline-block" : "none";
  document.title = total > 0 ? `(${total}) Customer Support Chat` : `Customer Support Chat`;
}

function autoResize() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
}

function scrollToBottom() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function formatTime(date) {
  if (!date) return '';
  const d = new Date(date);
  const now = new Date();
  return d.toDateString() === now.toDateString() 
    ? d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" })
    : d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function formatDate(date) {
  if (!date) return '';
  return new Date(date).toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" });
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function showToast(msg, type = "info") {
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => toast.classList.remove("show"), 3000);
}

function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    loadChats();
    if (currentChatId) loadMessages(currentChatId);
  }, 5000);
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (refreshInterval) clearInterval(refreshInterval);
  } else {
    loadChats();
    startAutoRefresh();
  }
});
</script>
</body>
</html>
