<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Support Chat | worldclassshipping Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="chat.css">
</head>
<body>

<header class="navbar">
  <div class="logo">worldclassshipping Admin - Customer Support</div>
  <nav>
    <a href="admin.html">Shipments</a>
    <a href="chat.html" class="active">Support Chat</a>
  </nav>
</header>

<div class="chat-admin-container">
  <!-- Sidebar: Chat List -->
  <aside class="chat-sidebar">
    <div class="sidebar-header">
      <h3>Active Chats</h3>
      <span class="unread-badge" id="totalUnread">0</span>
    </div>
    <div class="chat-search">
      <input type="text" id="searchChats" placeholder="Search by tracking number...">
    </div>
    <div class="chat-list" id="chatList">
      <!-- Chat items will be loaded here -->
      <div class="empty-state">
        <p>No active chats</p>
      </div>
    </div>
  </aside>

  <!-- Main Chat Area -->
  <main class="chat-main">
    <div class="chat-header" id="chatHeader">
      <div class="chat-header-info">
        <h4 id="chatTitle">Select a chat</h4>
        <p id="chatSubtitle">Click on a conversation to start</p>
      </div>
      <div class="chat-header-actions">
        <button id="closeChatBtn" class="btn-close" title="Close Chat">Close Chat</button>
        <button id="deleteChatBtn" class="btn-delete" title="Delete Chat">Delete</button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="empty-chat">
        <div class="empty-icon">💬</div>
        <p>Select a conversation from the sidebar</p>
      </div>
    </div>

    <div class="chat-input-area" id="chatInputArea" style="display: none;">
      <div class="typing-indicator" id="typingIndicator"></div>
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
        <button id="sendBtn" class="btn-send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- Notification Toast -->
<div class="toast" id="toast"></div>

<script src="chat.js"></script>
</body>
</html>
