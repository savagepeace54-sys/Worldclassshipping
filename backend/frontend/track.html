<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Shipment | worldclassshipping</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="track.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>

<header class="navbar">
  <div class="logo">worldclassshipping</div>
</header>

<section class="tracking-container">
  <h2>Shipment Tracking</h2>
  <p>Tracking Number: <strong id="tn"></strong></p>

  <div class="card">
    <h3>Shipment Details</h3>
    <p>Sender: <span id="sender"></span></p>
    <p>Receiver: <span id="receiver"></span></p>
    <p>Origin: <span id="origin"></span></p>
    <p>Destination: <span id="destination"></span></p>
    <p>Weight: <span id="weight"></span></p>
    <p>Status: <span id="status"></span></p>
    <p>Last Update: <span id="lastUpdate"></span></p>
  </div>

  <div class="card">
    <h3>Route</h3>
    <div id="map" style="height:350px"></div>
  </div>
</section>

<!-- Need Help Chat Widget -->
<div class="chat-widget" id="chatWidget">
  <!-- Floating Button -->
  <button class="chat-fab" id="chatFab" title="Need Help?">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
    </svg>
    <span class="chat-badge" id="chatBadge">0</span>
  </button>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow">
    <div class="chat-window-header">
      <div class="chat-header-title">
        <span class="status-dot"></span>
        <span>Customer Support</span>
      </div>
      <button class="chat-close-btn" id="chatCloseBtn">&times;</button>
    </div>

    <div class="chat-window-body" id="chatBody">
      <div class="chat-welcome">
        <div class="welcome-icon">👋</div>
        <h4>Hello!</h4>
        <p>How can we help you with your shipment <strong id="chatTrackingNumber"></strong>?</p>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <div class="chat-window-footer">
      <div class="typing-indicator" id="typingIndicator"></div>
      <div class="chat-input-wrapper">
        <input type="text" id="chatInput" placeholder="Type your message..." autocomplete="off">
        <button id="chatSendBtn" class="chat-send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="track.js"></script>
</body>
</html>
